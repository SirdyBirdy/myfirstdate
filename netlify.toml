# ================================================================
# myfirstdate.lol — netlify.toml
# ================================================================

[build]
  publish = "."

# ── Security & performance headers ──────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://pagead2.googlesyndication.com https://www.google-analytics.com https://googleads.g.doubleclick.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com;"

# ── Cache static assets aggressively ────────────────────────────
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# ── HTML: no cache (always fresh) ───────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control    = "public, max-age=0, must-revalidate"
    Content-Type     = "application/manifest+json"

# ── Redirects ────────────────────────────────────────────────────
[[redirects]]
  from   = "http://myfirstdate.lol/*"
  to     = "https://myfirstdate.lol/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.myfirstdate.lol/*"
  to     = "https://myfirstdate.lol/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.myfirstdate.lol/*"
  to     = "https://myfirstdate.lol/:splat"
  status = 301
  force  = true

# SPA fallback — serves index.html for any unmatched route
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
